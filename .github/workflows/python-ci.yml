name: python-ci

on:
  push:
    branches: [main, master]
    paths:
      - "crates/**"
      - "python/**"
      - "tests/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pyproject.toml"
      - ".github/workflows/python-ci.yml"
  pull_request:
    paths:
      - "crates/**"
      - "python/**"
      - "tests/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pyproject.toml"
      - ".github/workflows/python-ci.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  pytest:
    name: pytest (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package (builds extension via maturin backend)
        run: pip install . pytest pyyaml
      - name: Run integration tests
        run: pytest -q

  build:
    name: wheel (${{ matrix.platform.runner }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto
          sccache: true
      - name: Import smoke test
        shell: bash
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install dist/*.whl
          /tmp/venv/bin/python -c "
          import pdfboss
          doc = pdfboss.Document('tests/fixtures/hello.pdf')
          assert doc.page_count >= 1
          assert len(doc) == doc.page_count
          page = doc[0]
          assert page.width > 0 and page.height > 0
          text = page.extract_text()
          assert 'Hello' in text, text
          png = page.render(scale=1.0)
          assert png[:8] == b'\x89PNG\r\n\x1a\n'
          try:
              pdfboss.Document(data=b'not a pdf')
          except pdfboss.PdfError:
              pass
          else:
              raise SystemExit('expected PdfError on garbage input')
          print('ok', pdfboss.__version__)
          "
      - uses: actions/upload-artifact@v7
        with:
          name: ci-wheels-${{ runner.os }}-${{ matrix.platform.target }}
          path: dist
